name: Release OmiKit

on:
  push:
    branches: [main]
    paths:
      - 'OmiKit.podspec'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from podspec
        id: version
        run: |
          VERSION=$(grep -m1 "s.version" OmiKit.podspec | sed "s/.*'\(.*\)'.*/\1/")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if version changed
        id: check
        run: |
          # Compare podspec version with previous commit
          git show HEAD~1:OmiKit.podspec > /tmp/old_podspec 2>/dev/null || true
          OLD_VERSION=$(grep -m1 "s.version" /tmp/old_podspec 2>/dev/null | sed "s/.*'\(.*\)'.*/\1/" || echo "")
          NEW_VERSION=${{ steps.version.outputs.version }}

          if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo "Version unchanged ($NEW_VERSION), skipping release."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version changed: $OLD_VERSION -> $NEW_VERSION"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if tag already exists
        if: steps.check.outputs.changed == 'true'
        id: tag_check
        run: |
          TAG="${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "Tag $TAG already exists, skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release version $TAG"
          git push origin "$TAG"

      - name: Extract release notes for current version
        if: steps.check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract only the section for current version from CHANGELOG.md
          awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md > /tmp/release_notes.md
          if [ ! -s /tmp/release_notes.md ]; then
            echo "Release version $VERSION" > /tmp/release_notes.md
          fi
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        if: steps.check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: /tmp/release_notes.md

      - name: Setup CocoaPods
        if: steps.check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        run: gem install cocoapods

      - name: Pod lib lint
        if: steps.check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        run: pod lib lint OmiKit.podspec --allow-warnings --no-clean

      - name: Pod trunk push
        if: steps.check.outputs.changed == 'true' && steps.tag_check.outputs.exists == 'false'
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: pod trunk push OmiKit.podspec --allow-warnings
